<table border="1">


<tr>

<th>
Title
</th>


<th>
Author
</th>


<th>
Status
</th>


<th>
Action
</th>


</tr>


{% for book in books %}

<tr>

<td>
{{ book.title }}
</td>


<td>
{{ book.author }}
</td>


<td>


{% if book.available %}

Available

{% else %}

Borrowed by {{ book.borrower }}

{% endif %}


</td>


<td>


<a href="{% url 'book_update' book.id %}">
Edit
</a>


<a href="{% url 'book_delete' book.id %}">
Delete
</a>


{% if book.available %}

<a href="{% url 'borrow_book' book.id %}">
Borrow
</a>


{% else %}

<a href="{% url 'return_book' book.id %}">
Return
</a>


{% endif %}


</td>


</tr>


{% empty %}


<tr>

<td colspan="4">

No books found

</td>

</tr>


{% endfor %}


</table>
